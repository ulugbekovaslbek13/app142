<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>File Organizer</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:20px;
  text-align:center;
}

.container{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.box{
  width:250px;
  min-height:300px;
  background:#1e293b;
  border-radius:10px;
  padding:10px;
}

.file{
  background:#334155;
  padding:10px;
  margin:10px 0;
  border-radius:5px;
  cursor:grab;
}
</style>
</head>

<body>

<h1>📁 Drag & Drop Organizer</h1>

<div class="container">

  <div class="box" id="files">
    <h2>📄 Files</h2>

    <div class="file" draggable="true">resume.pdf</div>
    <div class="file" draggable="true">photo.png</div>
    <div class="file" draggable="true">music.mp3</div>
  </div>

  <div class="box" id="work">
    <h2>💼 Work</h2>
  </div>

  <div class="box" id="personal">
    <h2>🏠 Personal</h2>
  </div>

</div>

<script>
const files = document.querySelectorAll(".file");
const boxes = document.querySelectorAll(".box");

files.forEach(file => {
  file.addEventListener("dragstart", () => {
    file.classList.add("dragging");
  });

  file.addEventListener("dragend", () => {
    file.classList.remove("dragging");
  });
});

boxes.forEach(box => {
  box.addEventListener("dragover", e => {
    e.preventDefault();

    const dragging = document.querySelector(".dragging");

    box.appendChild(dragging);
  });
});
</script>

</body>
</html>
